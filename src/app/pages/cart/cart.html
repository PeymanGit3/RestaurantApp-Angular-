<div class="cart-container">
  <h2>🛒 Sepetim</h2>

  <div class="loading" *ngIf="isLoading">Yükleniyor...</div>

  <div class="empty-cart" *ngIf="!isLoading && cart.items.length === 0">
    <p>Sepetiniz boş!</p>
    <a routerLink="/products">Menüye Git</a>
  </div>

  <div class="cart-content" *ngIf="!isLoading && cart.items.length > 0">
    <div class="cart-items">
      <div class="cart-item" *ngFor="let item of cart.items">
        <img [src]="item.productImageUrl" [alt]="item.productName" />

        <div class="item-info">
          <h3>{{ item.productName }}</h3>
          <p class="item-price">{{ item.price | currency:'TRY':'₺' }}</p>
        </div>

        <div class="quantity-controls">
          <button (click)="decreaseQuantity(item)">−</button>
          <span>{{ item.quantity }}</span>
          <button (click)="increaseQuantity(item)">+</button>
        </div>

        <div class="item-total">
          {{ item.totalPrice | currency:'TRY':'₺' }}
        </div>

        <button class="remove-btn" (click)="removeItem(item.id)">🗑️</button>
      </div>
    </div>

    <div class="cart-summary">
      <h3>Sipariş Özeti</h3>
      <div class="summary-row">
        <span>Toplam</span>
        <span>{{ cart.totalAmount | currency:'TRY':'₺' }}</span>
      </div>
      <button class="checkout-btn" (click)="checkout()">Siparişi Tamamla</button>
    </div>
  </div>
</div>
