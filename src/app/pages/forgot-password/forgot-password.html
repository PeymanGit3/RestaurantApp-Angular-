<div class="forgot-container">
  <div class="forgot-card">
    <h2>🔑 Şifremi Unuttum</h2>
    <p>Email adresinizi girin, şifre sıfırlama kodu gönderelim</p>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="email@example.com"
        />
        <span class="error" *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
          Geçerli bir email girin
        </span>
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Gönderiliyor...' : 'Kod Gönder' }}
      </button>
    </form>

    <p class="back-link">
      <a routerLink="/login">← Giriş sayfasına dön</a>
    </p>
  </div>
</div>
