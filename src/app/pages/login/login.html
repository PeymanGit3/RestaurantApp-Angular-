<div class="login-container">
  <div class="login-card">
    <h2>Giriş Yap</h2>
    <p>Hesabınıza giriş yapın</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="email@example.com"
        />
        <span class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Geçerli bir email girin
        </span>
      </div>

      <div class="form-group">
        <label>Şifre</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Şifreniz"
        />
        <span class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Şifre en az 6 karakter olmalı
        </span>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Giriş yapılıyor...' : 'Giriş Yap' }}
      </button>
    </form>

<p class="register-link">
  Hesabınız yok mu? <a routerLink="/register">Kayıt Ol</a>
</p>
<p class="register-link">
  Şifrenizi mi unuttunuz? <a routerLink="/forgot-password">Şifremi Unuttum</a>
</p>
  </div>
</div>
