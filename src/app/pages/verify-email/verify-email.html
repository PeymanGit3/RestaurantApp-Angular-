<div class="verify-container">
  <div class="verify-card">
    <h2><i class="fa-solid fa-envelope"></i> Email Verification</h2>
    <p>Enter the verification code sent to your email</p>

    <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="email@example.com"
        />
        <span class="error" *ngIf="verifyForm.get('email')?.invalid && verifyForm.get('email')?.touched">
          Please enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label>Verification Code</label>
        <input
          type="text"
          formControlName="code"
          placeholder="Verification code sent to your email"
        />
        <span class="error" *ngIf="verifyForm.get('code')?.invalid && verifyForm.get('code')?.touched">
          Verification code is required
        </span>
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Verifying...' : 'Verify Email' }}
      </button>
    </form>
  </div>
</div>
