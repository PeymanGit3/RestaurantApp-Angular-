<div class="profile-container">
  <div class="profile-card">
    <h2><i class="fa-solid fa-user"></i> Profilim</h2>

    <div class="loading" *ngIf="isLoading">Yükleniyor...</div>

    <form [formGroup]="profileForm" (ngSubmit)="onProfileSubmit()" *ngIf="!isLoading">
      <div class="form-group">
        <label>Ad</label>
        <input type="text" formControlName="firstName" />
        <span class="error" *ngIf="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched">
          Ad gerekli
        </span>
      </div>

      <div class="form-group">
        <label>Soyad</label>
        <input type="text" formControlName="lastName" />
        <span class="error" *ngIf="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched">
          Soyad gerekli
        </span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
        <span class="error" *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
          Geçerli bir email girin
        </span>
      </div>

      <div class="success-message" *ngIf="profileSuccess">{{ profileSuccess }}</div>
      <div class="error-message" *ngIf="profileError">{{ profileError }}</div>

      <button type="submit" [disabled]="profileForm.invalid">Güncelle</button>
    </form>
  </div>

  <div class="profile-card">
    <h2><i class="fa-solid fa-lock"></i> Şifre Değiştir</h2>

    <form [formGroup]="passwordForm" (ngSubmit)="onPasswordSubmit()">
      <div class="form-group">
        <label>Eski Şifre</label>
        <input type="password" formControlName="oldPassword" placeholder="Eski şifreniz" />
        <span class="error" *ngIf="passwordForm.get('oldPassword')?.invalid && passwordForm.get('oldPassword')?.touched">
          Eski şifre gerekli
        </span>
      </div>

      <div class="form-group">
        <label>Yeni Şifre</label>
        <input type="password" formControlName="newPassword" placeholder="Yeni şifreniz" />
        <div class="form-group">
  <label>Yeni Şifre Tekrar</label>
  <input type="password" formControlName="confirmPassword" placeholder="Yeni şifrenizi tekrar girin" />
  <span class="error" *ngIf="passwordForm.get('confirmPassword')?.invalid && passwordForm.get('confirmPassword')?.touched">
    Şifre tekrarı gerekli
  </span>
</div>
        <span class="error" *ngIf="passwordForm.get('newPassword')?.invalid && passwordForm.get('newPassword')?.touched">
          Şifre en az 8 karakter, büyük/küçük harf ve özel karakter içermeli (!@#$)
        </span>
      </div>

      <div class="success-message" *ngIf="passwordSuccess">{{ passwordSuccess }}</div>
      <div class="error-message" *ngIf="passwordError">{{ passwordError }}</div>

      <button type="submit" [disabled]="passwordForm.invalid">Şifre Değiştir</button>
    </form>
  </div>
</div>
