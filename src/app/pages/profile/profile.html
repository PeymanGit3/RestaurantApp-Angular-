<div class="profile-container">
  <div class="profile-card">
    <h2>👤 Profilim</h2>

    <div class="loading" *ngIf="isLoading">Yükleniyor...</div>

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" *ngIf="!isLoading">
      <div class="form-group">
        <label>Ad</label>
        <input type="text" formControlName="firstName" />
        <span class="error" *ngIf="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched">
          Ad gerekli
        </span>
      </div>

      <div class="form-group">
        <label>Soyad</label>
        <input type="text" formControlName="lastName" />
        <span class="error" *ngIf="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched">
          Soyad gerekli
        </span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
        <span class="error" *ngIf="profileForm.get('email')?.invalid && profileForm.get('email')?.touched">
          Geçerli bir email girin
        </span>
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="profileForm.invalid">
        Güncelle
      </button>
    </form>
  </div>
</div>
