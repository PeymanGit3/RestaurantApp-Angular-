<div class="reset-container">
  <div class="reset-card">
    <h2><i class="fa-solid fa-lock"></i> Reset Password</h2>
    <p>Enter the code sent to your email and your new password</p>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Reset Code</label>
        <input
          type="text"
          formControlName="token"
          placeholder="Verification code sent to your email"
        />
        <span class="error" *ngIf="resetForm.get('token')?.invalid && resetForm.get('token')?.touched">
          Verification code is required
        </span>
      </div>

      <div class="form-group">
        <label>New Password</label>
        <input
          type="password"
          formControlName="newPassword"
          placeholder="Your new password"
        />
        <span class="error" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
          Password must be at least 6 characters long
        </span>
      </div>

      <div class="success-message" *ngIf="successMessage">
        {{ successMessage }}
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Reseting...' : 'Reset Password' }}
      </button>
    </form>

    <p class="back-link">
      <a routerLink="/login">← Back to Login</a>
    </p>
  </div>
</div>
