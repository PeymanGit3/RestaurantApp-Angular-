<div class="products-container">
  <div class="filter-section">
    <h3>Filtrele</h3>

    <input
      type="text"
      [(ngModel)]="filter.query"
      placeholder="Ürün ara..."
    />

    <select [(ngModel)]="filter.categoryId">
      <option [ngValue]="undefined">Tüm Kategoriler</option>
      <option *ngFor="let cat of categories" [value]="cat.id">
        {{ cat.name }}
      </option>
    </select>

    <div class="price-range">
      <input type="number" [(ngModel)]="filter.minPrice" placeholder="Min Fiyat" />
      <input type="number" [(ngModel)]="filter.maxPrice" placeholder="Max Fiyat" />
    </div>

    <label class="vegetarian-check">
      <input type="checkbox" [(ngModel)]="filter.vegetarian" />
      Vejetaryen
    </label>

    <div class="filter-buttons">
      <button class="btn-apply" (click)="applyFilter()">Filtrele</button>
      <button class="btn-reset" (click)="resetFilter()">Sıfırla</button>
    </div>
  </div>

  <div class="products-section">
    <div class="loading" *ngIf="isLoading">Yükleniyor...</div>

    <div class="products-grid" *ngIf="!isLoading">
      <app-product-card
        *ngFor="let product of products"
        [product]="product"
        (addToCart)="addToCart($event)">
      </app-product-card>
    </div>

    <div class="no-products" *ngIf="!isLoading && products.length === 0">
      Ürün bulunamadı!
    </div>

    <div class="pagination" *ngIf="!isLoading && products.length > 0">
      <button (click)="prevPage()" [disabled]="currentPage === 1">← Önceki</button>
      <span>Sayfa {{ currentPage }}</span>
      <button (click)="nextPage()" [disabled]="currentPage * take >= totalCount">Sonraki →</button>
    </div>
  </div>
</div>
