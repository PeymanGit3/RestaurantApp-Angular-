<nav class="navbar">
  <div class="navbar-brand">
    <a routerLink="/">🍔 Restaurant</a>
  </div>

  <div class="navbar-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Ana Sayfa</a>
    <a routerLink="/products" routerLinkActive="active">Menü</a>

    <ng-container *ngIf="isLoggedIn; else guestLinks">
      <a routerLink="/cart" routerLinkActive="active">🛒 Sepet</a>
      <a routerLink="/profile" routerLinkActive="active">👤 Profil</a>
      <button (click)="logout()">Çıkış</button>
    </ng-container>

    <ng-template #guestLinks>
      <a routerLink="/login" routerLinkActive="active">Giriş</a>
      <a routerLink="/register" routerLinkActive="active">Kayıt Ol</a>
    </ng-template>
  </div>
</nav>
